<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Damas Eng Website">

    <!-- السطر المهم الذي يطلبه Flutter -->
    <base href="/damas-eng/">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Damas Eng</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
  </head>

  <body>
    <script>
      const serviceWorkerVersion = "2839893634" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
    </script>
    <script src="flutter.js" defer></script>
    <script>
      window.addEventListener('load', function(ev) {
        _flutter.loader.loadEntrypoint({
          serviceWorker: {
            serviceWorkerVersion: serviceWorkerVersion,
          }
        }).then(function(engineInitializer) {
          return engineInitializer.initializeEngine();
        }).then(function(appRunner) {
          return appRunner.runApp();
        });
      });
    </script>
  </body>
</html>
